name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.11.0'

      - name: Install dependencies
        run: dart pub get

      - name: Test rhyolite_graph
        working-directory: packages/rhyolite_graph
        run: dart test

      - name: Test rhyolite_client_core
        working-directory: packages/client/rhyolite_client_core
        run: dart test

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.11.0'

      - name: Install dependencies
        run: dart pub get

      - name: Build plugin
        working-directory: packages/client/rhyolite_client_obsidian
        env:
          RELEASE: '1'
          USE_FVM: '0'
          OBSIDIAN_VAULT: /tmp/obsidian-build
        run: |
          dart run bin/build.dart \
            --dart-define=ACCOUNT_SERVICE_URL=${{ secrets.ACCOUNT_SERVICE_URL }} \
            --dart-define=SYNC_SERVICE_URL=${{ secrets.SYNC_SERVICE_URL }}

      - name: Compute artifact checksums
        id: checksums
        run: |
          MAIN_JS_SHA=$(sha256sum /tmp/obsidian-build/rhyolite-sync/main.js | awk '{print $1}')
          WASM_SHA=$(sha256sum sqlite3mc.wasm | awk '{print $1}')
          echo "main_js_sha=$MAIN_JS_SHA" >> "$GITHUB_OUTPUT"
          echo "wasm_sha=$WASM_SHA" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          DART_SDK=$(dart --version 2>&1)
          cat >> /tmp/release_notes.md << EOF
          $NOTES

          ---
          
          **Build environment**
          \`\`\`
          $DART_SDK
          \`\`\`

          To verify: clone tag \`${VERSION}\`, run \`RELEASE=1 USE_FVM=0 OBSIDIAN_VAULT=./build dart run bin/build.dart\` from \`packages/client/rhyolite_client_obsidian\`, compare SHA-256 of \`main.js\`.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/release_notes.md
          files: |
            /tmp/obsidian-build/rhyolite-sync/main.js
            manifest.json
            sqlite3mc.wasm
